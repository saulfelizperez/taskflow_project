<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Knowledge</title>
    <link rel="stylesheet" href="./dist/styles.css" />
    <script src="./theme.js"></script>
  </head>

  <body
    class="bg-white text-black dark:bg-slate-900 dark:text-white transition-colors duration-300"
  >
    <div class="flex min-h-screen p-8 gap-6">
      <!-- SIDEBAR -->
      <div class="w-64 space-y-6">
        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-lg font-semibold mb-4">Index</h2>
          <ul class="space-y-2 text-gray-600 dark:text-gray-300">
            <li>NAS100</li>
            <li>SP500</li>
            <li>DOW JONES</li>
            <li>IBEX 35</li>
          </ul>
        </div>
        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-lg font-semibold mb-4">Trading Tools</h2>
          <ul class="space-y-2 text-gray-600 dark:text-gray-300">
            <li>TradingView</li>
            <li>MT5</li>
            <li>EasyOrder</li>
          </ul>
        </div>
      </div>

      <!-- MAIN -->
      <div class="flex-1 space-y-8">
        <!-- INPUT -->
        <div
          class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow flex flex-col gap-3"
        >
          <input
            id="taskInput"
            type="text"
            placeholder="Write a new index"
            class="w-full p-3 rounded-lg bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-700"
          />

          <button
            id="addButton"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg"
          >
            Add up
          </button>

          <!-- NUEVO: búsqueda y filtros -->
          <input
            id="searchInput"
            placeholder="Buscar..."
            class="w-full p-3 rounded-lg bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-700 mt-4"
          />

          <select
            id="filterSelect"
            class="w-full p-3 rounded-lg bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-700 mt-2"
          >
            <option value="all">Todas</option>
            <option value="pending">Pendientes</option>
            <option value="completed">Completadas</option>
          </select>

          <button
            id="completeAllBtn"
            class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg mt-2"
          >
            Completar todas
          </button>
        </div>

        <!-- LIST -->
        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-xl font-semibold mb-6">Trading Basics</h2>
          <div id="list" class="space-y-4"></div>
        </div>
      </div>
    </div>

    <script>
      // ==== CARGAR TAREAS Y NORMALIZAR ====
      let rawTasks = JSON.parse(localStorage.getItem("tasks")) || [];
      let tasks = rawTasks
        .map((t) => {
          if (typeof t === "string") return { text: t, completed: false }; // tareas antiguas
          if (t && typeof t === "object")
            return { text: t.text || "", completed: !!t.completed };
          return null;
        })
        .filter(Boolean);

      // ==== GUARDAR ====
      function saveTasks() {
        localStorage.setItem("tasks", JSON.stringify(tasks));
      }

      // ==== AÑADIR NUEVA TAREA ====
      function addTask() {
        const input = document.getElementById("taskInput");
        const text = input.value.trim();
        if (!text) return;

        tasks.push({ text, completed: false });
        input.value = "";
        saveTasks();
        renderTasks();
      }

      // ==== FILTRADO Y BÚSQUEDA ====
      function getFilteredTasks() {
        const search = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const filter = document.getElementById("filterSelect").value;

        return tasks.filter((t) => {
          const matchText = t.text.toLowerCase().includes(search);
          let matchFilter = true;
          if (filter === "pending") matchFilter = !t.completed;
          if (filter === "completed") matchFilter = t.completed;
          return matchText && matchFilter;
        });
      }

      // ==== RENDERIZAR ====
      function renderTasks() {
        const list = document.getElementById("list");
        list.innerHTML = "";

        const filtered = getFilteredTasks();

        if (filtered.length === 0) {
          const msg = document.createElement("div");
          msg.className = "text-gray-400 dark:text-gray-500 py-6 text-center";
          msg.textContent = "No tasks found.";
          list.appendChild(msg);
          return;
        }

        filtered.forEach((t, i) => {
          const div = document.createElement("div");
          div.className =
            "flex justify-between p-4 bg-gray-200 dark:bg-slate-700 rounded-lg";

          div.innerHTML = `
      <span style="text-decoration:${t.completed ? "line-through" : "none"}">
        ${t.text}
      </span>
      <div class="flex gap-2">
        <button class="bg-green-500 text-white px-2 rounded">✔</button>
        <button class="bg-yellow-500 text-white px-2 rounded">✏️</button>
        <button class="bg-red-500 text-white px-2 rounded">🗑</button>
      </div>
    `;

          const [btnComplete, btnEdit, btnDelete] =
            div.querySelectorAll("button");

          btnComplete.onclick = () => {
            const idx = tasks.indexOf(t);
            tasks[idx].completed = !tasks[idx].completed;
            saveTasks();
            renderTasks();
          };

          btnEdit.onclick = () => {
            const idx = tasks.indexOf(t);
            const nuevo = prompt("Editar:", tasks[idx].text);
            if (nuevo) {
              tasks[idx].text = nuevo;
              saveTasks();
              renderTasks();
            }
          };

          btnDelete.onclick = () => {
            const idx = tasks.indexOf(t);
            tasks.splice(idx, 1);
            saveTasks();
            renderTasks();
          };

          list.appendChild(div);
        });
      }

      // ==== EVENTOS ====
      document.getElementById("addButton").onclick = addTask;
      document.getElementById("searchInput").oninput = renderTasks;
      document.getElementById("filterSelect").onchange = renderTasks;
      document.getElementById("completeAllBtn").onclick = () => {
        tasks.forEach((t) => (t.completed = true));
        saveTasks();
        renderTasks();
      };

      // ==== INICIALIZAR ====
      renderTasks();
    </script>
  </body>
</html>
