<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Knowledge</title>

    <link rel="stylesheet" href="./dist/styles.css" />

    <script>
      // ⬛ Mejorado: Funcionalidad para cargar tema guardado de manera más robusta
      (function () {
        const userTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (userTheme === "dark" || (!userTheme && prefersDark)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>

  <body
    class="bg-white text-black dark:bg-slate-900 dark:text-white transition-colors duration-300"
  >
    <div class="flex min-h-screen p-8 gap-6">
      <!-- SIDEBAR -->
      <div class="w-64 space-y-6">
        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-lg font-semibold mb-4">Index</h2>
          <ul class="space-y-2 text-gray-600 dark:text-gray-300">
            <li>NAS100</li>
            <li>SP500</li>
            <li>DOW JONES</li>
            <li>IBEX 35</li>
          </ul>
        </div>

        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-lg font-semibold mb-4">Trading Tools</h2>
          <ul class="space-y-2 text-gray-600 dark:text-gray-300">
            <li>TradingView</li>
            <li>MT5</li>
            <li>EasyOrder</li>
          </ul>
        </div>
      </div>

      <!-- MAIN -->
      <div class="flex-1 space-y-8">
        <!-- INPUT -->
        <div
          class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow flex gap-4 items-center"
        >
          <div class="flex-1">
            <h2 class="text-lg font-semibold mb-2">What is it for?</h2>

            <input
              id="taskInput"
              type="text"
              placeholder="Write a new index"
              autocomplete="off"
              class="w-full p-3 rounded-lg bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-700"
              aria-label="Write a new index"
            />
          </div>

          <button
            id="addButton"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg"
            type="button"
            aria-label="Add up"
          >
            Add up
          </button>
        </div>

        <hr class="border-gray-300 dark:border-gray-700" />

        <!-- LIST -->
        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-xl font-semibold mb-6">Trading Basics</h2>

          <div id="list" class="space-y-4">
            <div
              class="flex justify-between p-4 bg-gray-200 dark:bg-slate-700 rounded-lg"
            >
              <span>Risk Management</span>
              <span
                class="bg-blue-600 text-white w-8 h-8 flex items-center justify-center rounded-full"
                >1</span
              >
            </div>
            <div
              class="flex justify-between p-4 bg-gray-200 dark:bg-slate-700 rounded-lg"
            >
              <span>Technical Analysis</span>
              <span
                class="bg-blue-600 text-white w-8 h-8 flex items-center justify-center rounded-full"
                >2</span
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTÓN DARK MODE -->
    <button
      onclick="toggleTheme()"
      class="fixed bottom-8 right-8 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full shadow-lg"
      type="button"
      aria-label="Toggle Theme"
    >
      🌙 Toggle Theme
    </button>

    <script>
      /* ===== DARK MODE ===== */
      function toggleTheme() {
        const htmlElement = document.documentElement;
        const isDarkModeEnabled = htmlElement.classList.toggle("dark");
        localStorage.setItem("theme", isDarkModeEnabled ? "dark" : "light");
      }

      /* ===== TASK SYSTEM ===== */
      (function () {
        // DOM references
        const taskInputElement = document.getElementById("taskInput");
        const addTaskButton = document.getElementById("addButton");
        const taskListElement = document.getElementById("list");

        // State
        let taskItems = loadTasks();

        // --- State helpers ---
        function loadTasks() {
          let storedTasks = null;
          try {
            storedTasks = JSON.parse(localStorage.getItem("tasks"));
            if (!Array.isArray(storedTasks)) storedTasks = null;
          } catch (error) {
            storedTasks = null;
          }

          if (storedTasks && storedTasks.length > 0) {
            return storedTasks;
          }

          const tasksFromDom = Array.from(taskListElement.children)
            .map((taskElement) => {
              const label = taskElement.querySelector("span");
              return label ? label.textContent.trim() : null;
            })
            .filter(Boolean);

          saveTasks(tasksFromDom);
          return tasksFromDom;
        }

        function saveTasks(updatedTasks) {
          taskItems = updatedTasks;
          localStorage.setItem("tasks", JSON.stringify(taskItems));
        }

        // --- UI render helpers ---
        function createEmptyStateElement() {
          const emptyStateElement = document.createElement("div");
          emptyStateElement.className =
            "text-gray-400 dark:text-gray-500 py-6 text-center";
          emptyStateElement.textContent = "No tasks found. Add your first topic!";
          return emptyStateElement;
        }

        function createTaskElement(taskLabel, index) {
          const taskContainer = document.createElement("div");
          taskContainer.className =
            "flex justify-between items-center p-4 bg-gray-200 dark:bg-slate-700 rounded-lg group transition hover:shadow";

          taskContainer.innerHTML = `
              <span tabindex="0" title="${taskLabel}">${taskLabel}</span>
              <button class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded ml-4 transition"
                type="button" aria-label="Delete ${taskLabel}" title="Delete">
                Delete
              </button>
            `;

          const deleteButton = taskContainer.querySelector("button");
          deleteButton.addEventListener("click", () => {
            if (confirm(`Delete "${taskLabel}"?`)) {
              const remainingTasks = taskItems.filter((_, currentIndex) => currentIndex !== index);
              saveTasks(remainingTasks);
              renderTasks();
            }
          });

          return taskContainer;
        }

        function renderTasks() {
          taskListElement.innerHTML = "";

          if (!taskItems || taskItems.length === 0) {
            taskListElement.appendChild(createEmptyStateElement());
            return;
          }

          taskItems.forEach((taskLabel, index) => {
            const taskElement = createTaskElement(taskLabel, index);
            taskListElement.appendChild(taskElement);
          });
        }

        // --- Input / events ---
        function addTaskFromInput() {
          const newTaskLabel = taskInputElement.value.trim();

          // Basic empty check
          if (!newTaskLabel) {
            showValidationState({
              type: "error",
              placeholder: "Please enter something!",
            });
            return;
          }

          // Length constraints
          if (newTaskLabel.length < 3) {
            showValidationState({
              type: "error",
              placeholder: "At least 3 characters",
            });
            return;
          }

          if (newTaskLabel.length > 60) {
            showValidationState({
              type: "error",
              placeholder: "Max 60 characters",
            });
            return;
          }

          // Only spaces / symbols not allowed
          if (!/[a-zA-Z0-9]/.test(newTaskLabel)) {
            showValidationState({
              type: "error",
              placeholder: "Use letters or numbers",
            });
            return;
          }

          // Prevent duplicates (case-insensitive)
          const alreadyExists = taskItems.some(
            (taskLabel) => taskLabel.toLowerCase() === newTaskLabel.toLowerCase()
          );
          if (alreadyExists) {
            showValidationState({
              type: "warning",
              clearValue: true,
              placeholder: "Already exists!",
            });
            return;
          }

          const updatedTasks = [...taskItems, newTaskLabel];
          saveTasks(updatedTasks);
          renderTasks();
          taskInputElement.value = "";
        }

        function showValidationState({
          type,
          placeholder,
          clearValue = false,
          durationMs = 1400,
        }) {
          const className =
            type === "warning" ? "border-yellow-500" : "border-red-500";

          taskInputElement.classList.add(className);
          if (clearValue) taskInputElement.value = "";
          taskInputElement.placeholder = placeholder;

          setTimeout(() => {
            taskInputElement.classList.remove(className);
            taskInputElement.placeholder = "Write a new index";
          }, durationMs);
        }

        function registerTaskEventHandlers() {
          addTaskButton.addEventListener("click", addTaskFromInput);
          taskInputElement.addEventListener("keypress", (event) => {
            if ((event.key === "Enter" || event.keyCode === 13) && !event.shiftKey) {
              addTaskFromInput();
            }
          });
        }

        // --- Initialization ---
        renderTasks();
        registerTaskEventHandlers();
        window.addEventListener("DOMContentLoaded", () => taskInputElement.focus());
      })();
    </script>
  </body>
</html>
