<!doctype html>
<html lang="es" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Knowledge</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
  </head>

  <body
    class="flex flex-col min-h-screen transition-colors duration-300 bg-white dark:bg-slate-900 text-black dark:text-white"
  >
    <header class="w-full text-center py-4 bg-white dark:bg-slate-900 shadow">
      <h1 class="text-4xl font-bold">TradingMania</h1>
    </header>

    <!-- 🔥 FIX RESPONSIVE LAYOUT -->
    <div class="flex-1 flex flex-col md:flex-row p-4 md:p-8 gap-4 md:gap-6">
      <!-- 🔥 SIDEBAR RESPONSIVE -->
      <aside class="w-full md:w-64 space-y-6">
        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-lg font-semibold mb-4">Index</h2>
          <ul class="space-y-2 text-gray-600 dark:text-gray-300">
            <li>NAS100</li>
            <li>SP500</li>
            <li>DOW JONES</li>
            <li>IBEX 35</li>
          </ul>
        </div>

        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-lg font-semibold mb-4">Trading Tools</h2>
          <ul class="space-y-2 text-gray-600 dark:text-gray-300">
            <li>TradingView</li>
            <li>MT5</li>
            <li>EasyOrder</li>
          </ul>
        </div>
      </aside>

      <!-- 🔥 MAIN RESPONSIVE -->
      <main class="flex-1 w-full space-y-6 md:space-y-8">
        <section
          class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow flex flex-col gap-3"
        >
          <input
            id="taskInput"
            type="text"
            placeholder="Write the next trading idea 📊"
            class="w-full p-3 rounded-lg bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-700"
          />

          <!-- FIX BOTÓN -->
          <button
            id="addButton"
            class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg"
          >
            Add up
          </button>

          <input
            id="searchInput"
            placeholder="Search..."
            class="w-full p-3 rounded-lg bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-700 mt-4"
          />

          <select
            id="filterSelect"
            class="w-full p-3 rounded-lg bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-700 mt-2"
          >
            <option value="all">All</option>
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
          </select>

          <button
            id="completeAllBtn"
            class="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg mt-2"
          >
            Complete All
          </button>

          <button
            id="deleteCompletedBtn"
            class="w-full md:w-auto bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg mt-2"
          >
            Delete Completed
          </button>

          <select
            id="listaSelect"
            class="w-full p-3 rounded-lg bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-700 mt-2"
          >
            <option value="📈Trading Basics📉">📈Trading Basics📉</option>
            <option value="🧠PsicoTrading🧠">🧠PsicoTrading🧠</option>
          </select>
        </section>

        <!-- LIST CONTAINER -->
        <section
          id="listsContainer"
          class="space-y-4 mt-6 rounded-xl p-6 bg-gray-100 dark:bg-slate-800 shadow min-h-[200px]"
        ></section>
      </main>
    </div>

    <footer class="text-center p-4">
      <p class="text-sm text-gray-500">© 2026 Trading Knowledge</p>
    </footer>

    <!-- DARK MODE -->
    <button
      id="Switch-Mode"
      class="fixed bottom-6 right-6 px-4 py-2 bg-gray-300 dark:bg-gray-700 rounded-full"
    >
      🌙 Dark Mode
    </button>

    <script type="module">
      const API = window.location.hostname.includes("vercel.app")
        ? "https://taskflow-project-l1d1.onrender.com/api/v1/tasks"
        : "/api/v1/tasks";

      let tasks = [];

      const container = document.getElementById("listsContainer");
      const input = document.getElementById("taskInput");

      async function loadTasks() {
        container.innerHTML = `<div class="text-center py-6">Loading...</div>`;

        const res = await fetch(API);
        const data = await res.json();

        tasks = Array.isArray(data) ? data : [];

        renderTasks();
      }

      async function createTask(title) {
        const listName = document.getElementById("listaSelect").value;

        await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, listName }),
        });

        loadTasks();
      }

      async function deleteTask(id) {
        await fetch(`${API}/${id}`, { method: "DELETE" });
        loadTasks();
      }

      async function toggleTask(task) {
        await fetch(`${API}/${task.id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ completed: !task.completed }),
        });

        loadTasks();
      }

      function renderTasks() {
        container.innerHTML = "";

        const currentList = document.getElementById("listaSelect").value;
        const filter = document.getElementById("filterSelect").value;

        const title = document.createElement("h2");
        title.textContent = currentList;
        title.className = "text-xl font-bold mb-4";
        container.appendChild(title);

        const filtered = tasks.filter((t) => {
          const matchList = t.listName === currentList;

          if (filter === "pending") return !t.completed && matchList;
          if (filter === "completed") return t.completed && matchList;
          return matchList;
        });

        filtered.forEach((t) => {
          const div = document.createElement("div");

          // 🔥 FIX RESPONSIVE TASK ITEM
          div.className =
            "flex flex-col md:flex-row justify-between gap-2 md:items-center p-4 bg-gray-200 dark:bg-slate-700 rounded-lg";

          div.innerHTML = `
            <span style="text-decoration:${t.completed ? "line-through" : "none"}">
              ${t.title}
            </span>
            <div class="flex gap-2">
              <button>✔</button>
              <button>🗑</button>
            </div>
          `;

          const [ok, del] = div.querySelectorAll("button");

          ok.onclick = () => toggleTask(t);
          del.onclick = () => deleteTask(t.id);

          container.appendChild(div);
        });
      }

      document.getElementById("addButton").onclick = () => {
        if (!input.value) return;
        createTask(input.value);
        input.value = "";
      };

      document.getElementById("filterSelect").onchange = renderTasks;
      document.getElementById("listaSelect").onchange = renderTasks;

      const html = document.documentElement;
      const themeButton = document.getElementById("Switch-Mode");

      let isDark =
        localStorage.getItem("theme") === "dark" ||
        (!localStorage.getItem("theme") &&
          window.matchMedia("(prefers-color-scheme: dark)").matches);

      html.classList.toggle("dark", isDark);
      themeButton.textContent = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";

      themeButton.addEventListener("click", () => {
        isDark = html.classList.toggle("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        themeButton.textContent = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
      });

      loadTasks();
    </script>
  </body>
</html>
