<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Knowledge</title>

    <link rel="stylesheet" href="./dist/styles.css" />

    <script>
      // Cargar tema guardado
      if (
        localStorage.getItem("theme") === "dark" ||
        (!localStorage.getItem("theme") &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>

  <body
    class="bg-white text-black dark:bg-slate-900 dark:text-white transition-colors duration-300"
  >
    <div class="flex min-h-screen p-8 gap-6">
      <!-- SIDEBAR -->
      <div class="w-64 space-y-6">
        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-lg font-semibold mb-4">Index</h2>
          <ul class="space-y-2 text-gray-600 dark:text-gray-300">
            <li>NAS100</li>
            <li>SP500</li>
            <li>DOW JONES</li>
            <li>IBEX 35</li>
          </ul>
        </div>

        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-lg font-semibold mb-4">Trading Tools</h2>
          <ul class="space-y-2 text-gray-600 dark:text-gray-300">
            <li>TradingView</li>
            <li>MT5</li>
            <li>EasyOrder</li>
          </ul>
        </div>
      </div>

      <!-- MAIN -->
      <div class="flex-1 space-y-8">
        <!-- INPUT -->
        <div
          class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow flex gap-4 items-center"
        >
          <div class="flex-1">
            <h2 class="text-lg font-semibold mb-2">What is it for?</h2>

            <input
              id="taskInput"
              type="text"
              placeholder="Write a new index"
              class="w-full p-3 rounded-lg bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-700"
            />
          </div>

          <button
            id="addButton"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg"
          >
            Add up
          </button>
        </div>

        <hr class="border-gray-300 dark:border-gray-700" />

        <!-- LIST -->
        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-xl font-semibold mb-6">Trading Basics</h2>

          <div id="list" class="space-y-4">
            <div
              class="flex justify-between p-4 bg-gray-200 dark:bg-slate-700 rounded-lg"
            >
              <span>Risk Management</span>
              <span
                class="bg-blue-600 text-white w-8 h-8 flex items-center justify-center rounded-full"
                >1</span
              >
            </div>
            <div
              class="flex justify-between p-4 bg-gray-200 dark:bg-slate-700 rounded-lg"
            >
              <span>Technical Analysis</span>
              <span
                class="bg-blue-600 text-white w-8 h-8 flex items-center justify-center rounded-full"
                >2</span
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTÓN DARK MODE -->
    <button
      onclick="toggleTheme()"
      class="fixed bottom-8 right-8 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full shadow-lg"
    >
      🌙 Toggle Theme
    </button>

    <script>
      /* ===== DARK MODE ===== */
      function toggleTheme() {
        const html = document.documentElement;
        if (html.classList.contains("dark")) {
          html.classList.remove("dark");
          localStorage.setItem("theme", "light");
        } else {
          html.classList.add("dark");
          localStorage.setItem("theme", "dark");
        }
      }

      /* ===== TASK SYSTEM ===== */
      const input = document.getElementById("taskInput");
      const addButton = document.getElementById("addButton");
      const list = document.getElementById("list");

      // 1️⃣ Leer tareas desde localStorage
      let tasks = JSON.parse(localStorage.getItem("tasks"));

      // 2️⃣ Si no hay tareas guardadas, tomar las que ya están en el HTML
      if (!tasks || tasks.length === 0) {
        tasks = Array.from(list.children).map(
          (item) => item.querySelector("span").textContent,
        );
        saveTasks();
      }

      // Guardar tareas en localStorage
      function saveTasks() {
        localStorage.setItem("tasks", JSON.stringify(tasks));
      }

      // Renderizar tareas
      function renderTasks() {
        list.innerHTML = "";
        tasks.forEach((task, index) => {
          const item = document.createElement("div");
          item.className =
            "flex justify-between items-center p-4 bg-gray-200 dark:bg-slate-700 rounded-lg";

          item.innerHTML = `
      <span>${task}</span>
      <button class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded">Delete</button>
    `;

          const deleteBtn = item.querySelector("button");
          deleteBtn.addEventListener("click", () => {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
          });

          list.appendChild(item);
        });
      }

      // Añadir tarea
      function addTask() {
        const text = input.value.trim();
        if (!text) return;
        tasks.push(text);
        saveTasks();
        renderTasks();
        input.value = "";
      }

      // Eventos
      addButton.addEventListener("click", addTask);
      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addTask();
      });

      // Render inicial
      renderTasks();
    </script>
  </body>
</html>
