<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Knowledge</title>

    <link rel="stylesheet" href="./dist/styles.css" />

    <script>
      // ⬛ Mejorado: Funcionalidad para cargar tema guardado de manera más robusta
      (function () {
        const userTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (userTheme === "dark" || (!userTheme && prefersDark)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>

  <body
    class="bg-white text-black dark:bg-slate-900 dark:text-white transition-colors duration-300"
  >
    <div class="flex min-h-screen p-8 gap-6">
      <!-- SIDEBAR -->
      <div class="w-64 space-y-6">
        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-lg font-semibold mb-4">Index</h2>
          <ul class="space-y-2 text-gray-600 dark:text-gray-300">
            <li>NAS100</li>
            <li>SP500</li>
            <li>DOW JONES</li>
            <li>IBEX 35</li>
          </ul>
        </div>

        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-lg font-semibold mb-4">Trading Tools</h2>
          <ul class="space-y-2 text-gray-600 dark:text-gray-300">
            <li>TradingView</li>
            <li>MT5</li>
            <li>EasyOrder</li>
          </ul>
        </div>
      </div>

      <!-- MAIN -->
      <div class="flex-1 space-y-8">
        <!-- INPUT -->
        <div
          class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow flex gap-4 items-center"
        >
          <div class="flex-1">
            <h2 class="text-lg font-semibold mb-2">What is it for?</h2>

            <input
              id="taskInput"
              type="text"
              placeholder="Write a new index"
              autocomplete="off"
              class="w-full p-3 rounded-lg bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-700"
              aria-label="Write a new index"
            />
          </div>

          <button
            id="addButton"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg"
            type="button"
            aria-label="Add up"
          >
            Add up
          </button>
        </div>

        <hr class="border-gray-300 dark:border-gray-700" />

        <!-- LIST -->
        <div class="bg-gray-100 dark:bg-slate-800 rounded-xl p-6 shadow">
          <h2 class="text-xl font-semibold mb-6">Trading Basics</h2>

          <div id="list" class="space-y-4">
            <div
              class="flex justify-between p-4 bg-gray-200 dark:bg-slate-700 rounded-lg"
            >
              <span>Risk Management</span>
              <span
                class="bg-blue-600 text-white w-8 h-8 flex items-center justify-center rounded-full"
                >1</span
              >
            </div>
            <div
              class="flex justify-between p-4 bg-gray-200 dark:bg-slate-700 rounded-lg"
            >
              <span>Technical Analysis</span>
              <span
                class="bg-blue-600 text-white w-8 h-8 flex items-center justify-center rounded-full"
                >2</span
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTÓN DARK MODE -->
    <button
      onclick="toggleTheme()"
      class="fixed bottom-8 right-8 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full shadow-lg"
      type="button"
      aria-label="Toggle Theme"
    >
      🌙 Toggle Theme
    </button>

    <script>
      /* ===== DARK MODE ===== */
      function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.classList.toggle("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
      }

      /* ===== TASK SYSTEM ===== */
      (function () {
        const input = document.getElementById("taskInput");
        const addButton = document.getElementById("addButton");
        const list = document.getElementById("list");

        let tasks = loadTasks();

        function loadTasks() {
          let stored = null;
          try {
            stored = JSON.parse(localStorage.getItem("tasks"));
            if (!Array.isArray(stored)) stored = null;
          } catch (e) {
            stored = null;
          }

          if (stored && stored.length > 0) {
            return stored;
          }

          const initialFromDom = Array.from(list.children)
            .map((item) => {
              const span = item.querySelector("span");
              return span ? span.textContent.trim() : null;
            })
            .filter(Boolean);

          saveTasks(initialFromDom);
          return initialFromDom;
        }

        function saveTasks(newTasks) {
          tasks = newTasks;
          localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        function renderTasks() {
          list.innerHTML = "";
          if (!tasks || tasks.length === 0) {
            const emptyMsg = document.createElement("div");
            emptyMsg.className = "text-gray-400 dark:text-gray-500 py-6 text-center";
            emptyMsg.textContent = "No tasks found. Add your first topic!";
            list.appendChild(emptyMsg);
            return;
          }

          tasks.forEach((task, index) => {
            const item = document.createElement("div");
            item.className =
              "flex justify-between items-center p-4 bg-gray-200 dark:bg-slate-700 rounded-lg group transition hover:shadow";

            // Mejorado: añade tooltip accesible y tabindex
            item.innerHTML = `
              <span tabindex="0" title="${task}">${task}</span>
              <button class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded ml-4 transition"
                type="button" aria-label="Delete ${task}" title="Delete">
                Delete
              </button>
            `;

            const deleteBtn = item.querySelector("button");
            deleteBtn.addEventListener("click", () => {
              if (confirm(`Delete "${task}"?`)) {
                const updatedTasks = tasks.filter((_, i) => i !== index);
                saveTasks(updatedTasks);
                renderTasks();
              }
            });

            list.appendChild(item);
          });
        }

        function addTaskFromInput() {
          const text = input.value.trim();
          if (!text) {
            input.classList.add("border-red-500");
            input.placeholder = "Please enter something!";
            setTimeout(() => {
              input.classList.remove("border-red-500");
              input.placeholder = "Write a new index";
            }, 1400);
            return;
          }

          if (tasks.includes(text)) {
            input.classList.add("border-yellow-500");
            input.value = "";
            input.placeholder = "Already exists!";
            setTimeout(() => {
              input.classList.remove("border-yellow-500");
              input.placeholder = "Write a new index";
            }, 1400);
            return;
          }

          const updatedTasks = [...tasks, text];
          saveTasks(updatedTasks);
          renderTasks();
          input.value = "";
        }

        function setupTaskEventHandlers() {
          addButton.addEventListener("click", addTaskFromInput);
          input.addEventListener("keypress", (e) => {
            if ((e.key === "Enter" || e.keyCode === 13) && !e.shiftKey) {
              addTaskFromInput();
            }
          });
        }

        renderTasks();
        setupTaskEventHandlers();

        window.addEventListener("DOMContentLoaded", () => input.focus());
      })();
    </script>
  </body>
</html>
